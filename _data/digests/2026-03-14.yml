  title: Structure-Aware Epistemic Uncertainty Quantification for Neural Operator
    PDE Surrogates
  why: 'arXiv:2603.11052v1 Announce Type: new Abstract: Neural operators (NOs) provide
    fast, resolution-invariant surrogates for mapping input fiel…'
  takeaway: 'arXiv:2603.11052v1 Announce Type: new Abstract: Neural operators (NOs)
    provide fast, resolution-invariant surrogates for mapping input fields to PDE
